services:
  app:
    build: .
    container_name: orphancenter_backend
    working_dir: /app
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: orphancenter_db
      DB_USER: root
      DB_PASSWORD: rootpassword
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm ci || npm install; exec npm run dev"

  db:
    image: mysql:8.0
    container_name: orphancenter_mysql
    restart: always
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: orphancenter_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
